name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Fixture check
        run: swift run usage-fixture-check

  package:
    runs-on: macos-15
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Package DMG
        run: |
          chmod +x scripts/package-dmg.sh
          VERSION="${GITHUB_REF_NAME#v}" BUILD_NUMBER="${GITHUB_RUN_NUMBER}" scripts/package-dmg.sh
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: NotchMeter-dmg
          path: dist/*.dmg

  release:
    runs-on: macos-15
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Package DMG
        run: |
          chmod +x scripts/package-dmg.sh
          VERSION="${GITHUB_REF_NAME#v}" BUILD_NUMBER="${GITHUB_RUN_NUMBER}" scripts/package-dmg.sh
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
